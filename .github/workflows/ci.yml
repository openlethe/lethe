name: CI

on:
  push:
    branches: [main]
    tags: [v*]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: plugin/package-lock.json

      - name: Verify modules
        run: go mod verify

      - name: Check formatting
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            printf 'Unformatted Go files:\n%s\n' "$files"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Static analysis
        run: go run honnef.co/go/tools/cmd/staticcheck@v0.6.1 ./...

      - name: Race tests
        run: go test -race ./...

      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

      - name: Security static analysis
        run: go run github.com/securego/gosec/v2/cmd/gosec@v2.22.5 -quiet ./...

      - name: Memory Git migration upgrade tests
        run: go test ./internal/db/ -run 'TestMigration|TestMigrateChangesetDigestsV2|TestConflictMigration' -count=1

      - name: Historical reconstruction benchmarks (smoke)
        run: go test ./internal/db/ -run XXX -bench 'BenchmarkReconstructLinear1K|BenchmarkMemoryHistoryAt10K' -benchtime 2x

      - name: Validate shell scripts
        run: |
          while IFS= read -r -d '' script; do
            case "$(head -n 1 "$script")" in
              *bash*) bash -n "$script" ;;
              *) sh -n "$script" ;;
            esac
          done < <(find . -type f -name '*.sh' -not -path './.git/*' -print0)

      - name: Validate workflows
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12 .github/workflows/*.yml

      - name: Validate Compose files
        env:
          LETHE_API_KEY: ci-placeholder
        run: |
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose.git.yml config --quiet

      - name: Plugin install and build
        working-directory: plugin
        run: |
          npm ci
          npm run build

      - name: Plugin tests
        working-directory: plugin
        run: npm test

      - name: npm production audit
        working-directory: plugin
        run: npm audit --omit=dev --audit-level=high

      - name: Generated artifact consistency
        run: |
          # The shipped plugin bundle must match plugin source.
          diff <(jq -S . plugin/openclaw.plugin.json) <(jq -S . plugins/lethe/openclaw.plugin.json)

      - name: Build hardened container
        run: docker build -t lethe-ci:${{ github.sha }} .

      - name: Verify non-root image
        run: |
          test "$(docker image inspect lethe-ci:${{ github.sha }} --format '{{.Config.User}}')" = '1000:1000' || \
            docker run --rm --entrypoint /usr/bin/id lethe-ci:${{ github.sha }} | grep -Eq 'uid=(1000|10001)'
