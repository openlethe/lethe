{{template "base" .}}

{{define "title"}}Lethe — Dashboard{{end}}

{{define "content"}}
<div class="grid grid-cols-4 gap-4 mb-8">
  <div class="card p-5">
    <div class="text-[#6b7280] text-xs uppercase tracking-wider mb-1">Sessions</div>
    <div class="text-3xl font-bold" hx-get="/api/stats" hx-trigger="load" hx-swap="innerHTML">
      <span class="htmx-indicator">…</span>
    </div>
  </div>
  <div class="card p-5">
    <div class="text-[#6b7280] text-xs uppercase tracking-wider mb-1">Events</div>
    <div class="text-3xl font-bold">—</div>
  </div>
  <div class="card p-5">
    <div class="text-[#6b7280] text-xs uppercase tracking-wider mb-1">Checkpoints</div>
    <div class="text-3xl font-bold">—</div>
  </div>
  <div class="card p-5">
    <div class="text-[#6b7280] text-xs uppercase tracking-wider mb-1">Flags</div>
    <div class="text-3xl font-bold">—</div>
  </div>
</div>

<div class="grid grid-cols-2 gap-6">
  <div class="card p-5">
    <h2 class="text-sm font-semibold text-[#9ca3af] uppercase tracking-wider mb-4">Recent Sessions</h2>
    <div hx-get="/api/sessions?limit=5" hx-trigger="load" hx-swap="innerHTML">
      <div class="text-[#6b7280] text-sm htmx-indicator">Loading…</div>
    </div>
  </div>

  <div class="card p-5">
    <h2 class="text-sm font-semibold text-[#9ca3af] uppercase tracking-wider mb-4">Recent Flags</h2>
    <div hx-get="/api/flags?limit=5" hx-trigger="load" hx-swap="innerHTML">
      <div class="text-[#6b7280] text-sm htmx-indicator">Loading…</div>
    </div>
  </div>

  <div class="card p-5 col-span-2">
    <h2 class="text-sm font-semibold text-[#9ca3af] uppercase tracking-wider mb-4">Quick Actions</h2>
    <div class="flex gap-3">
      <a href="/sessions" class="btn btn-ghost">Browse Sessions</a>
      <a href="/flags" class="btn btn-ghost">Review Flags</a>
      <a href="/live" class="btn btn-ghost">Watch Live</a>
    </div>
  </div>
</div>
{{end}}
