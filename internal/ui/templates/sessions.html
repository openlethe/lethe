{{template "base" .}}

{{define "title"}}Sessions — Lethe{{end}}

{{define "content"}}
<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold">Sessions</h1>
  <div class="flex gap-2">
    <input type="text" id="session-search" placeholder="Search sessions…" 
           hx-get="/api/sessions" hx-trigger="keyup changed delay:300ms" 
           hx-target="#sessions-list" hx-vals='{"q": "test"}' class="w-64">
  </div>
</div>

<div class="card">
  <div id="sessions-list" hx-get="/api/sessions?limit=20" hx-trigger="load" hx-swap="innerHTML">
    <div class="p-8 text-center text-[#6b7280] htmx-indicator">Loading sessions…</div>
  </div>
</div>
{{end}}
