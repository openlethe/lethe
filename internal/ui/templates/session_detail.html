{{template "base" .}}

{{define "title"}}Session — Lethe{{end}}

{{define "content"}}
<div class="mb-6 flex items-center gap-3">
  <a href="/sessions" class="text-[#6b7280] hover:text-[#e2e8f0]">← Sessions</a>
  <span class="text-[#2d3140]">/</span>
  <span class="mono text-sm" id="session-id-display">{{.SessionID}}</span>
</div>

<div class="grid grid-cols-3 gap-6">
  <!-- Left: session info + checkpoints -->
  <div class="space-y-4">
    <div class="card p-5">
      <h2 class="text-sm font-semibold text-[#9ca3af] uppercase tracking-wider mb-3">Session</h2>
      <div id="session-info" hx-get="/api/sessions/{{.SessionID}}" hx-trigger="load" hx-swap="innerHTML">
        <div class="text-[#6b7280] htmx-indicator">Loading…</div>
      </div>
    </div>

    <div class="card p-5">
      <h2 class="text-sm font-semibold text-[#9ca3af] uppercase tracking-wider mb-3">Checkpoints</h2>
      <div id="checkpoints-list" hx-get="/api/sessions/{{.SessionID}}/checkpoints" hx-trigger="load" hx-swap="innerHTML">
        <div class="text-[#6b7280] htmx-indicator">Loading…</div>
      </div>
    </div>

    <div class="card p-5">
      <h2 class="text-sm font-semibold text-[#9ca3af] uppercase tracking-wider mb-3">Actions</h2>
      <div class="flex flex-col gap-2">
        <button class="btn btn-primary" hx-post="/api/sessions/{{.SessionID}}/compact"
                hx-swap="none" onclick="this.textContent='Compacting…'">
          Trigger Compaction
        </button>
      </div>
    </div>
  </div>

  <!-- Right: event timeline -->
  <div class="col-span-2 card p-5">
    <h2 class="text-sm font-semibold text-[#9ca3af] uppercase tracking-wider mb-3">Events</h2>
    <div id="events-list" hx-get="/api/sessions/{{.SessionID}}/events?limit=50" hx-trigger="load" hx-swap="innerHTML">
      <div class="text-[#6b7280] htmx-indicator">Loading…</div>
    </div>
  </div>
</div>
{{end}}
