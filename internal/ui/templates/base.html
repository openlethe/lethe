{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{template "title" .}}</title>
  <script src="https://unpkg.com/htmx.org@2.0.0" defer></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f1117; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; }
    .card { background: #1a1d27; border: 1px solid #2d3140; border-radius: 8px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
    .badge-record { background: #1e3a5f; color: #60a5fa; }
    .badge-log { background: #1a3020; color: #4ade80; }
    .badge-flag { background: #3b2a1a; color: #fb923c; }
    .badge-task { background: #2a1f3b; color: #c084fc; }
    .badge-todo { background: #2a1f3b; color: #c084fc; }
    .badge-in_progress { background: #1a3020; color: #4ade80; }
    .badge-done { background: #1e3a5f; color: #60a5fa; }
    .badge-blocked { background: #3b1a1a; color: #f87171; }
    .badge-active { background: #1a3020; color: #4ade80; }
    .badge-interrupted { background: #3b2a1a; color: #fb923c; }
    .badge-completed { background: #1e3a5f; color: #60a5fa; }
    nav a { padding: 8px 16px; border-radius: 6px; transition: background 0.15s; color: #9ca3af; text-decoration: none; display: inline-block; }
    nav a:hover { background: #2d3140; color: #e2e8f0; }
    nav a.active { background: #2d3140; color: #60a5fa; }
    .mono { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12px; }
    .timestamp { color: #6b7280; font-size: 11px; }
    pre { white-space: pre-wrap; word-break: break-word; font-family: inherit; }
    table th { text-align: left; padding: 8px 12px; border-bottom: 1px solid #2d3140; color: #6b7280; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; }
    table td { padding: 10px 12px; border-bottom: 1px solid #1f2333; vertical-align: top; }
    table tr:hover td { background: #1a1d27; }
    .btn { display: inline-block; padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; transition: all 0.15s; cursor: pointer; border: none; text-decoration: none; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-danger { background: #dc2626; color: white; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-ghost { background: transparent; color: #9ca3af; border: 1px solid #2d3140; }
    .btn-ghost:hover { background: #2d3140; color: #e2e8f0; }
    input, select { background: #1a1d27; border: 1px solid #2d3140; border-radius: 6px; padding: 6px 10px; color: #e2e8f0; font-size: 13px; outline: none; }
    input:focus, select:focus { border-color: #3b82f6; }
    .htmx-indicator { opacity: 0; transition: opacity 0.3s; }
    .htmx-request .htmx-indicator { opacity: 1; }
  </style>
</head>
<body class="min-h-screen">
  <nav class="border-b border-[#2d3140] px-6 py-3 flex items-center gap-6 sticky top-0 bg-[#0f1117]/95 backdrop-blur z-50">
    <div class="flex items-center gap-2">
      <span class="text-lg font-bold tracking-tight">∿ Lethe</span>
    </div>
    <div class="flex gap-1">
      <a href="/dashboard">Dashboard</a>
      <a href="/sessions">Sessions</a>
      <a href="/flags">Flags</a>
      <a href="/live">Live</a>
    </div>
    <div class="ml-auto flex items-center gap-3">
      <span class="text-xs text-[#6b7280]" id="server-status">
        <span class="inline-block w-2 h-2 rounded-full bg-[#4ade80] mr-1"></span>
        Connected
      </span>
    </div>
  </nav>
  <main class="p-6 max-w-7xl mx-auto">
    {{template "content" .}}
  </main>
  <script>
    document.body.addEventListener('htmx:error', function(e) {
      document.getElementById('server-status').innerHTML = '<span class="inline-block w-2 h-2 rounded-full bg-red-500 mr-1"></span>Disconnected';
    });
  </script>
</body>
</html>
{{end}}

{{define "title"}}Lethe{{end}}

{{define "content"}}
<div class="text-center py-20 text-[#6b7280]">Loading…</div>
{{end}}
